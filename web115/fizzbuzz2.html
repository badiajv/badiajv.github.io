<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <div data-include="components/header.html"></div>
    <main>
        <h2>FizzBuzz 2</h2>
        <h3 id="greeting">Welcome to James's Slithering Snake!</h3>
        <form>
            <label for="first_name">Enter your first name: </label>
            <input type="text" id="first_name" placeholder="ex. John"><br>
            <label for="middle_initial">Enter your middle initial: </label>
            <input type="text" id="middle_initial" placeholder="ex. M" maxlength="1"><br>
            <label for="last_name">Enter your last name: </label>
            <input type="text" id="last_name" placeholder="ex. Smith"><br>
            <label for="count">How much do you want to count: </label>
            <input type="text" id="count" placeholder="40"><br>
            <label for="special1">Special Number 1: </label>
            <input type="text" id="special1" placeholder="3"><br>
            <label for="special2">Special Number 2: </label>
            <input type="text" id="special2" placeholder="5"><br>
            <button type="submit">Submit</button>
        </form>
        <ol></ol>
    </main>
    <div data-include="components/footer.html"></div>
